name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: imsitchat
          POSTGRES_PASSWORD: imsitchat_secret
          POSTGRES_DB: imsitchat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U imsitchat -d imsitchat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install server deps
        run: cd server && npm ci
      - name: Run migrations
        run: cd server && npx tsx src/db/migrate.ts
        env:
          DATABASE_URL: postgresql://imsitchat:imsitchat_secret@localhost:5432/imsitchat
      - name: Run unit tests
        run: cd server && npm test
        env:
          JWT_SECRET: test-secret
      - name: Run integration tests
        run: cd server && npm run test:integration
        env:
          DATABASE_URL: postgresql://imsitchat:imsitchat_secret@localhost:5432/imsitchat
          JWT_SECRET: test-secret
